name: Release

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的 tag 时触发构建

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare Release Artifacts
        run: |
          mkdir staging
          cp target/x86_64-pc-windows-msvc/release/cursor_overlay.exe staging/cursor_overlay.exe
        shell: bash

      - name: Create and Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: staging/cursor_overlay.exe
          name: Release ${{ github.ref_name }}
          body: |
            ## Windows 鼠标特效悬浮窗 ${{ github.ref_name }}
            
            这是由 GitHub Actions 自动编译生成的 Release 版本。
            
            ### 📦 包含资源：
            * `cursor_overlay.exe` - Windows 64位免安装便携版可执行程序。
            
            ### 🚀 运行说明：
            * 双击 `cursor_overlay.exe` 即可启动。
            * 在后台运行后，将在所有显示屏上呈现彩虹鼠标尾迹与全局点击水波纹。
            * 要关闭程序，可在任务管理器中结束进程，或在命令行启动的窗口中按 `Ctrl + C`。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
